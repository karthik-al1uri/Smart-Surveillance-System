cameras: []

detection:
  model_path: "models/yolov8m.pt"
  input_size: 640
  confidence_threshold: 0.45
  iou_threshold: 0.5
  batch_size: 4
  device: "cpu"
  target_classes:
    - person
    - car
    - truck
    - bus
    - motorcycle
    - bicycle
    - backpack
    - handbag
    - knife
    - scissors

pose:
  model_path: "models/yolov8m-pose.pt"
  input_size: 640
  confidence_threshold: 0.45
  iou_threshold: 0.5
  device: "cpu"
  keypoint_confidence_threshold: 0.3
  single_pass_mode: true

pipeline:
  skip_object_detection: false

tracker:
  max_lost_frames: 30
  iou_threshold_high: 0.3
  iou_threshold_low: 0.5
  confidence_split: 0.5
  min_hits: 3
  history_length: 64

action_recognition:
  model_path: "models/action_classifier_v1.pt"
  device: "cpu"
  window_size: 16
  stride: 8
  num_classes: 15
  hidden_size: 128
  num_layers: 2
  dropout: 0.3
  bidirectional: true
  confidence_threshold: 0.4
  min_keypoint_confidence: 0.3
  min_visible_keypoints: 10
  use_velocity_features: false

ingestion:
  frame_queue_size: 30
  target_fps: 2
  reconnect_delay_seconds: 5

scoring:
  weights:
    action: 0.35
    zone: 0.25
    weapon: 0.30
    time_of_day: 0.10

  alert_threshold: 0.55
  escalation_threshold: 0.85

  instant_alert_classes:
    - "knife"
    - "gun"
    - "rifle"
    - "scissors"

  cooldown_seconds: 30
  hysteresis_count: 2

  high_risk_hours: [22, 23, 0, 1, 2, 3, 4, 5]
  time_risk_multiplier: 0.15

  stale_track_cleanup_seconds: 60

  camera_overrides: {}

storage:
  clip_dir: "data/clips"
  clip_retention_days: 30
  clip_storage_path: "data/clips"
  clip_codec: "mp4v"
  clip_fps: 10
  clip_quality: 85
  max_clip_duration: 20
  retention_days: 30
  clip_buffer_duration: 20
  clip_buffer_fps: 10
  clip_buffer_compressed: true
  retention_check_interval: 3600

notifications:
  websocket:
    enabled: true
    host: "0.0.0.0"
    port: 8765
    ping_interval: 30
    ping_timeout: 10

  webhook:
    enabled: false
    endpoints: []

  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    smtp_username: ""
    smtp_password: ""
    use_tls: true
    from_address: "alerts@surveillance.local"
    recipients: []
    min_interval_seconds: 300
    min_priority: "high"

alerts:
  rate_limit:
    max_alerts_per_minute: 10
    max_alerts_per_minute_global: 30
  grouping:
    enabled: true
    window_seconds: 10
    same_camera_only: true
  escalation:
    enabled: true
    timeout_seconds: 300
    escalation_channels: ["email"]
  history_size: 1000

dashboard_url: "http://localhost:3000"

database:
  url: "postgresql://sss_user:sss_dev_password@localhost:5432/sss_db"
  fallback_url: "sqlite:///data/sss_dev.db"
  auto_fallback: true
  pool_size: 5
  max_overflow: 10
  pool_recycle: 3600
  echo_sql: false

auth:
  secret_key: "change-this-in-production-please"
  algorithm: "HS256"
  access_token_expire_minutes: 480
  default_admin:
    username: "admin"
    password: "admin"
    role: "admin"

logging:
  level: "INFO"
  format: "json"
