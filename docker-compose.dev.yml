version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sss_postgres
    environment:
      POSTGRES_DB: sss_db
      POSTGRES_USER: sss_user
      POSTGRES_PASSWORD: sss_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sss_user -d sss_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
